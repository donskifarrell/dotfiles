# .sops.yaml - sops-nix creation rules for the post-Clan repo.
#
# Recipients:
#   admin_df       = my personal age key (lets ME decrypt/edit). The public half
#                    is the &admin_df value below; the private half is my
#                    ~/.config/sops/age/keys.txt (keep it; it is the editor identity).
#   host_abhaile   = ssh-to-age of abhaile's EXISTING /etc/ssh/ssh_host_ed25519_key.
#                    Verified: ssh-to-age of
#                    "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIISW7n05i04ujUtjywXbAgIVOUK6lCc6FFVtGSzoByJJ"
#                    => age1gglfnksmkvjlvnzunt6lmvzngam66cpwrek73t3dnn5l05qlq3ls4pcjdn
#                    (abhaile decrypts with the host key it already holds - nothing to deploy.)
#   host_eachtrach = FILL IN after the fresh eachtrach is provisioned (Phase 6):
#                    `ssh-to-age < /etc/ssh/ssh_host_ed25519_key.pub` on the new box,
#                    then `sops updatekeys secrets/shared.yaml`.
#
# To recompute a host recipient at any time:
#   ssh-to-age < /etc/ssh/ssh_host_ed25519_key.pub
#   # or from a stored pub value:
#   echo 'ssh-ed25519 AAAA...' | ssh-to-age
keys:
  - &admin_df age1awmgrhav72rx0dluch3ztj0ku6xkrg2utnrkva2qhm8sdw76sf7qqc9c5t
  - &host_abhaile age1gglfnksmkvjlvnzunt6lmvzngam66cpwrek73t3dnn5l05qlq3ls4pcjdn
  # - &host_eachtrach age1xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
creation_rules:
  # Shared secrets: anything consumed on more than one host (df's home ssh/git
  # files, tailscale auth keys). Must list EVERY host that reads them + admin.
  - path_regex: secrets/shared\.yaml$
    key_groups:
      - age:
          - *admin_df
          - *host_abhaile
          # - *host_eachtrach   # uncomment + updatekeys once eachtrach exists
  # abhaile-only secrets (password hashes, machine services).
  - path_regex: secrets/abhaile\.yaml$
    key_groups:
      - age:
          - *admin_df
          - *host_abhaile

# Template for the fresh eachtrach (Phase 6); leave commented until it exists.
